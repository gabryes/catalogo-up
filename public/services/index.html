<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviços | Catálogo UP</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #0B1E40;
      background: #f5f7fb;
      line-height: 1.6;
    }
    header { 
      background: #0B1E40;
      color: #fff;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header h1 a { color: #fff; text-decoration: none; }
    header p { opacity: 0.8; margin-top: 0.3rem; font-size: 0.95rem; }
    
    .comercial-destaque {
      background: #fff159;
      padding: 2rem 1rem;
      text-align: center;
      border-bottom: 1px solid #ddd;
      margin-bottom: 2rem;
    }
    .comercial-destaque h2 { color: #333; margin-bottom: 0.5rem; font-size: 1.4rem; }
    .comercial-destaque p { color: #666; margin-bottom: 1.2rem; }
    .btn-comercial {
      display: inline-block;
      background: #3483fa;
      color: #fff;
      padding: 0.8rem 2rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn-comercial:hover { background: #2968c8; }

    /* Hub de Ofertas - grade responsiva de botões */
    .grid-ofertas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    .grid-ofertas .oferta-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #fff159;
      color: #0B1E40;
      text-decoration: none;
      padding: 1.4rem 1rem;
      border-radius: 14px;
      border: 2px solid rgba(11,30,64,0.08);
      box-shadow: 0 2px 6px rgba(11,30,64,0.10);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      text-align: center;
      min-height: 130px;
    }
    .grid-ofertas .oferta-card:hover {
      transform: translateY(-3px) scale(1.02);
      background: #ffe14d;
      box-shadow: 0 8px 18px rgba(11,30,64,0.22);
      border-color: rgba(11,30,64,0.18);
    }
    .grid-ofertas .oferta-card .icone-oferta {
      width: 34px;
      height: 34px;
      color: #0B1E40;
      flex-shrink: 0;
    }
    .grid-ofertas .oferta-card .oferta-titulo {
      font-size: 1.05rem;
      font-weight: 800;
      line-height: 1.2;
    }
    .grid-ofertas .oferta-card .oferta-desc {
      font-size: 0.82rem;
      opacity: 0.8;
      line-height: 1.25;
    }
    .grid-ofertas .oferta-card .oferta-cta {
      margin-top: 0.25rem;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #3483fa;
    }

    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .barra-busca { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.5rem; }
    .barra-busca input[type="text"], .barra-busca select {
      padding: 0.7rem 0.9rem; border: 1px solid #d0d7e2; border-radius: 8px;
      font-size: 1rem; background: #fff; color: #0B1E40;
    }
    .barra-busca input[type="text"] { flex: 1 1 260px; }
    .barra-busca select { flex: 0 1 220px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .card {
      background: #fff; border-radius: 10px; padding: 1.2rem;
      box-shadow: 0 1px 3px rgba(11,30,64,0.08);
      border: 1px solid #e6ebf2; display: flex; flex-direction: column;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,85,212,0.18); }
    .card h3 { color: #0055D4; font-size: 1.1rem; margin-bottom: 0.4rem; }
    .card .categoria {
      display: inline-block; font-size: 0.75rem; font-weight: 600;
      background: rgba(0,85,212,0.1); color: #0055D4;
      padding: 0.2rem 0.6rem; border-radius: 999px; margin-bottom: 0.6rem;
      align-self: flex-start;
    }
    .card .descricao { color: #4a5878; font-size: 0.9rem; flex: 1; }
    .card a.ver { margin-top: 0.9rem; color: #0055D4; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    .detalhe { background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 1px 3px rgba(11,30,64,0.08); }
    .detalhe h2 { color: #0055D4; margin-bottom: 0.5rem; }
    .detalhe .info-item { border-top: 1px solid #eef2f7; padding-top: 0.6rem; margin-top: 0.6rem; }
    .detalhe .info-item .rotulo { font-size: 0.78rem; text-transform: uppercase; color: #8a98b3; }
    .voltar { display: inline-block; margin-bottom: 1rem; color: #0055D4; text-decoration: none; font-weight: 600; }
    footer { text-align: center; padding: 2rem 1rem; color: #8a98b3; font-size: 0.85rem; }
    .social-icons { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .social-whatsapp, .social-instagram, .social-telefone {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 50%;
      color: white; text-decoration: none;
    }
    .social-whatsapp { background-color: #25D366; }
    .social-whatsapp svg { width: 24px; height: 24px; display: block; }
    .social-instagram { background-color: #E1306C; }
    .social-telefone { background-color: #6c757d; }
    </style>
</head>
<body>
<header>
  <h1><a href="../index.html">Catálogo UP</a></h1>
  <p>Lista completa de serviços</p>
</header>
<main>
<a class="voltar" href="../index.html">&larr; Voltar ao início</a>
<div class="barra-busca">
  <input type="text" id="busca" placeholder="Buscar serviços..." autocomplete="off">
  <select id="filtro-categoria">
    <option value="">Todas as categorias</option>
    <option value="Administrativo">Administrativo</option>
<option value="Alimentação">Alimentação</option>
<option value="Serviços Gerais">Serviços Gerais</option>
  </select>
</div>
<div class="grid" id="lista-servicos"></div>
<div class="vazio" id="sem-resultados" style="display:none; text-align:center; padding:2rem; color:#8a98b3;">
  Nenhum serviço encontrado.
</div>
<script>
const SERVICOS = [{"id": "extingo-pragas", "nome": "Extingo Pragas", "categoria": "Serviços Gerais", "descricao": "Dedetização de insetos rasteiros \r\nBaratas, formigas,\r\naranhas, escorpiões e etc. \r\nDesratização \r\nControle de insetos voadores \r\nMosquitos, moscas , pernilongos e outros \r\nBarreira química pra cupim de solo e madeira \r\nHigienização de caixa d'água"}, {"id": "matheus-antonio", "nome": "Matheus Antonio", "categoria": "Administrativo", "descricao": "Atendimento Juridico. BPO Financeiro. Rotina Adminstrativa e Financeira. Abertura e regularização de MEI. Apoio Fiscal. Consultoria Financeira"}, {"id": "dm-solucoes-eletricas-linhares", "nome": "DM Soluções Elétricas ⚡️ Linhares", "categoria": "Serviços Gerais", "descricao": "DM Soluções Elétricas ⚡️ Linhares \n86 99825-1101 \nResidencial odete Nunes Q H \nAtendimento aos finais de semana. 7:30 as 18:00\ndanielslinhares4@gmail.com"}, {"id": "cozinha-caseira-amanda", "nome": "Cozinha Caseira Amanda", "categoria": "Alimentação", "descricao": "Comidas caseiras , lanches e sobremesas. 🥘🍰\n86995201406\nQuadra B3 Lote 41 \n19:00 as 23:00"}];
const busca = document.getElementById('busca');
const filtro = document.getElementById('filtro-categoria');
const lista = document.getElementById('lista-servicos');
const vazio = document.getElementById('sem-resultados');

function render() {
  const q = busca.value.trim().toLowerCase();
  const cat = filtro.value;
  const filtrados = SERVICOS.filter(s => {
    const matchCat = !cat || s.categoria === cat;
    const matchQ = !q || s.nome.toLowerCase().includes(q) || s.descricao.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  lista.innerHTML = filtrados.map(s => `
    <article class="card">
      <span class="categoria">${s.categoria}</span>
      <h3>${s.nome}</h3>
      <p class="descricao">${(s.descricao||'').slice(0,120)}${(s.descricao||'').length>120?'...':''}</p>
      <a class="ver" href="${s.id}/index.html">Ver detalhes &rarr;</a>
    </article>
  `).join('');
  vazio.style.display = filtrados.length ? 'none' : 'block';
}
busca.addEventListener('input', render);
filtro.addEventListener('change', render);
render();
</script>

</main>
<footer>
  Catálogo UP &middot; Gabriel Informática - gabryes@gmail.com - (86)9 9532-5524 - 2026
</footer>
</body>
</html>
